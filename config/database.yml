default: &default
  # 统一的 PostgreSQL 连接配置（各环境/各角色复用）
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "root") %>
  password: <%= ENV.fetch("DB_PASSWORD", "root") %>
  database: <%= ENV.fetch("DB_NAME", "ruby_db") %>
  # 连接池大小（建议与 Puma/线程数一致）
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  # primary：业务主库（ActiveRecord 默认使用）
  primary:
    <<: *default
  # cache：Solid Cache 使用的连接（这里与主库同库不同迁移目录）
  cache:
    <<: *default
    migrations_paths: db/cache_migrate
  # queue：Solid Queue 使用的连接（这里与主库同库不同迁移目录）
  queue:
    <<: *default
    migrations_paths: db/queue_migrate
  # cable：Solid Cable（Action Cable 持久化）使用的连接（这里与主库同库不同迁移目录）
  cable:
    <<: *default
    migrations_paths: db/cable_migrate

test:
  # primary：测试主库（运行测试时使用）
  primary:
    <<: *default
  # cache：测试环境的 Solid Cache
  cache:
    <<: *default
    migrations_paths: db/cache_migrate
  # queue：测试环境的 Solid Queue
  queue:
    <<: *default
    migrations_paths: db/queue_migrate
  # cable：测试环境的 Solid Cable
  cable:
    <<: *default
    migrations_paths: db/cable_migrate

production:
  # primary：生产主库
  primary:
    <<: *default
  # cache：生产环境的 Solid Cache
  cache:
    <<: *default
    migrations_paths: db/cache_migrate
  # queue：生产环境的 Solid Queue
  queue:
    <<: *default
    migrations_paths: db/queue_migrate
  # cable：生产环境的 Solid Cable
  cable:
    <<: *default
    migrations_paths: db/cable_migrate
